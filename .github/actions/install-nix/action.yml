name: install Nix

inputs:
  cachixAuthToken:
    description: auth token for https://app.cachix.org/cache/rvolosatovs

permissions:
  id-token: write
  contents: read

runs:
  using: composite
  steps:
  - uses: DeterminateSystems/determinate-nix-action@92ffb5400c3776307a27a1727d7e2ac3dcd9f844 # v3.18.1
    with:
      extra-conf: |
        accept-flake-config = true

  - uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
    continue-on-error: true
    with:
      name: nixify
      authToken: '${{ inputs.cachixAuthToken }}'
